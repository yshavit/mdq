name: System tests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "feature/*" ]
  workflow_dispatch: { }

permissions:
  contents: read

jobs:
  toml-cases:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v0.6.2

      - name: Build mdq
        run: cargo build

      - name: Install toml2json
        run: command -v toml2json || cargo install toml2json

      - name: Run tests
        run: |
          set -euo pipefail

          test_failures=0

          # Run each test toml file
          for test_file in tests/md_cases/*.toml; do
            ./scripts/system_test ./target/debug/mdq "$test_file" || test_failures=$((test_failures + 1))
          done

          # Report any failures
          if [ "$test_failures" -ne 0 ]; then
            echo "::error title=failures::$test_failures test(s) failed"
            exit 1
          fi
